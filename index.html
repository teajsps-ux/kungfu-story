<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>功夫的秘密 — 湯姆牛繪本故事導讀首頁</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent:  #d35400;   /* 溫暖橘紅 */
      --accent2: #16a085;   /* 碧綠/翠綠色 */
      --bg-light: #f4f7f6;  /* 3D紙雕明亮背景色 */
      --text-main: #2c3e50; /* 深石板灰 */
      --text-header: #1a202c; /* 深藍黑 */
    }
    html, body {
      min-height: 100%;
      font-family: 'Outfit', 'Noto Sans TC', sans-serif;
      color: var(--text-main);
      background: var(--bg-light);
    }
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .container {
      max-width: 1000px;
      width: 100%;
      text-align: center;
    }
    header {
      margin-bottom: 40px;
    }
    header .tag {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 13px;
      letter-spacing: 0.1em;
      margin-bottom: 12px;
      font-weight: 600;
      box-shadow: 0 4px 10px rgba(217, 83, 30, 0.2);
    }
    header h1 {
      font-size: 38px;
      color: var(--text-header);
      margin-bottom: 12px;
      text-shadow: 1px 1px 0px #fff, 2px 2px 4px rgba(0,0,0,0.08);
    }
    header .subtitle {
      font-size: 16px;
      color: #718096;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      margin-bottom: 40px;
    }
    @media (max-width: 768px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
    .card {
      background: #ffffff;
      border-radius: 20px;
      padding: 40px 30px;
      text-decoration: none;
      color: inherit;
      border: 1px solid rgba(0, 0, 0, 0.06);
      box-shadow: 0 15px 35px rgba(0,0,0,0.05), 0 2px 10px rgba(0,0,0,0.02);
      transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      position: relative;
    }
    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.08), 0 5px 15px rgba(0,0,0,0.03);
      border-color: var(--accent2);
    }
    .card .icon-wrap {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: #f0f7f6;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      transition: background 0.3s ease;
    }
    .card:hover .icon-wrap {
      background: rgba(22, 160, 133, 0.1);
    }
    .card .icon-wrap img {
      width: 54px;
      height: 54px;
      object-fit: contain;
    }
    .card h2 {
      font-size: 22px;
      color: var(--text-header);
      margin-bottom: 14px;
      font-weight: 700;
    }
    .card p {
      font-size: 14px;
      color: #64748b;
      line-height: 1.7;
      margin-bottom: 24px;
      flex-grow: 1;
    }
    .card .btn {
      background: var(--accent2);
      color: #ffffff;
      padding: 10px 24px;
      border-radius: 30px;
      font-weight: 600;
      font-size: 14px;
      box-shadow: 0 4px 12px rgba(22, 160, 133, 0.2);
      transition: background 0.3s ease, box-shadow 0.3s ease;
    }
    .card:hover .btn {
      background: #148f77;
      box-shadow: 0 6px 16px rgba(22, 160, 133, 0.3);
    }
    footer {
      font-size: 13px;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="tag">湯姆牛經典繪本故事導讀</div>
      <h1>功夫的秘密</h1>
      <p class="subtitle">請選擇您想要體驗的簡報排版方案，開始探索功夫的真諦</p>
    </header>
    
    <div class="grid">
      <!-- 方案一 -->
      <a class="card" href="index_opt1.html">
        <div class="icon-wrap">
          <img src="images/icon_axe.png" alt="方案一圖標">
        </div>
        <h2>方案一：卡紙底色保護版</h2>
        <p>保留全螢幕紙雕大底圖的視覺衝擊，但在文字外圍加上一層細緻的不透明白卡紙底色保護框，為低年級學童提供極高的文字對比度與最佳閱讀清晰度。</p>
        <span class="btn">進入簡報 ➔</span>
      </a>
      
      <!-- 方案二 -->
      <a class="card" href="index_opt2.html">
        <div class="icon-wrap">
          <img src="images/icon_bow.png" alt="方案二圖標">
        </div>
        <h2>方案二：左右分欄電子書版</h2>
        <p>模仿真實故事繪本，採用「左側滿版插圖、右側故事文字書頁」的分欄排版。文字欄位在字級放大時支援獨立垂直捲動，字體變大不裁切，畫面比例超完美。</p>
        <span class="btn">進入簡報 ➔</span>
      </a>
    </div>
    
    <footer>
      <p>🛠️ 湯姆牛《功夫》簡報導讀系統 ． 用 GitHub Pages 打造</p>
    </footer>
  </div>
</body>
</html>
